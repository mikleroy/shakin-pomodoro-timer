<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Pomodoro</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  width:300px;
  background:#232220;
  color:#f0ebe3;
  font-family:-apple-system,'Segoe UI',system-ui,sans-serif;
  font-size:12px;
  overflow:hidden;
  user-select:none;
}
.card { padding:22px 22px 20px; position:relative; }
.close-btn {
  position:absolute; top:10px; right:12px;
  background:none; border:none; color:#6a6560;
  font-size:20px; cursor:pointer; line-height:1; padding:2px 6px;
}
.close-btn:hover { color:#f0ebe3; }
.icon { font-size:38px; text-align:center; margin-bottom:10px; }
.title { font-size:15px; font-weight:600; text-align:center; color:#f0ebe3; margin-bottom:7px; }
.msg { font-size:11px; color:#8a8580; text-align:center; margin-bottom:20px; line-height:1.55; }
.btns { display:flex; gap:10px; }
.btn {
  flex:1; font-family:inherit; font-size:11px; letter-spacing:0.06em;
  text-transform:uppercase; border:1px solid #484440; background:#2d2b28;
  color:#9a9590; padding:11px 8px; cursor:pointer; border-radius:4px;
  transition:all 0.15s; white-space:nowrap;
}
.btn:hover { color:#f0ebe3; border-color:#6a6560; }
.btn.primary { background:#e87820; border-color:#e87820; color:#fff; }
.btn.primary:hover { background:#ff9a40; }
.btn:active { opacity:0.75; }
</style>
</head>
<body>
<div class="card">
  <button class="close-btn" id="btn-close">×</button>
  <div class="icon" id="icon">🍅</div>
  <div class="title" id="title">Pomodoro done!</div>
  <div class="msg" id="msg">Great work! What's next?</div>
  <div class="btns">
    <button class="btn primary" id="btn1">☕ Rest</button>
    <button class="btn" id="btn2">▶ One more</button>
  </div>
</div>
<script src="notify.js"></script>
</body>
</html>
